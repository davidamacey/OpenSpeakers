# docker-compose.gpu.yml
# Optional overlay for GPU acceleration (NVIDIA)
#
# Apply manually or via a startup script:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.gpu.yml up
#
# Configuration:
#   GPU_DEVICE_ID  — which GPU to use for TTS inference (default: 0)

services:
  worker:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['${GPU_DEVICE_ID:-0}']
    environment:
      - GPU_DEVICE_ID=${GPU_DEVICE_ID:-0}
      - CUDA_VISIBLE_DEVICES=${GPU_DEVICE_ID:-0}

  worker-fish:
    deploy:
      resources:
        reservations:
