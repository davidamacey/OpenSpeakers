# docker-compose.gpu.yml
# Optional overlay for GPU acceleration (NVIDIA)
#
# Normally auto-applied via COMPOSE_FILE in .env:
#   docker compose up -d
#
# For offline/air-gapped installs, apply manually:
#   docker compose -f docker-compose.yml -f docker-compose.offline.yml -f docker-compose.gpu.yml up -d
#
# Configuration:
#   GPU_DEVICE_ID  — which GPU to use for TTS inference (default: 0)

services:
  worker:
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['${GPU_DEVICE_ID:-0}']
    environment:
      - GPU_DEVICE_ID=${GPU_DEVICE_ID:-0}
      - CUDA_VISIBLE_DEVICES=${GPU_DEVICE_ID:-0}

