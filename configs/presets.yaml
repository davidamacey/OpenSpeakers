# OpenSpeakers generation presets
# These appear in the frontend as quick-select options.

presets:
  natural:
    name: Natural
    description: Balanced speed and expression
    speed: 1.0
    pitch: 0.0
    language: en

  fast:
    name: Fast
    description: 1.3× speed for rapid content
    speed: 1.3
    pitch: 0.0
    language: en

  slow_clear:
    name: Slow & Clear
    description: 0.85× speed, good for instructions
    speed: 0.85
    pitch: 0.0
    language: en

  deep:
    name: Deep Voice
    description: Natural speed, -3 semitone pitch shift
    speed: 1.0
    pitch: -3.0
    language: en

  high:
    name: Higher Pitch
    description: Natural speed, +3 semitone pitch shift
    speed: 1.0
    pitch: 3.0
    language: en
