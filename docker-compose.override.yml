# OpenSpeakers Development Overrides
# Automatically loaded by `docker compose up` in development.
# Mounts source code for hot reload on both backend and frontend.

services:
  backend:
    image: open_speakers-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  worker:
    image: open_speakers-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output

  frontend:
    image: open_speakers-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
