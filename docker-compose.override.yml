# OpenSpeakers Development Overrides
# Automatically loaded by `docker compose up` in development.
# Mounts source code for hot reload on both backend and frontend.

services:
  backend:
    image: open_speakers-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  worker:
    image: open_speakers-worker:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    volumes:
      - ./backend:/app
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./model_cache}/torch:/root/.cache/torch
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
      # VibeVoice custom fork — mounted for editable development
      - ${VIBEVOICE_REPO_PATH:-/mnt/nvm/repos/VibeVoice}:/opt/vibevoice
      # NAS models — local model weights (avoid HuggingFace downloads)
      - /mnt/nas/models:/models
    environment:
      # Add VibeVoice to Python path so it can be imported
      - PYTHONPATH=/opt/vibevoice:${PYTHONPATH:-}
      # Use local model paths instead of HuggingFace repo IDs
      - VIBEVOICE_MODEL_PATH=/models/vibevoice/VibeVoice-Realtime-0.5B
      - VIBEVOICE_1P5B_MODEL_PATH=/models/vibevoice/VibeVoice-1.5B

  worker-fish:
    image: open_speakers-worker-fish:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.worker-fish
    volumes:
      - ./backend:/app
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
      # NAS models — local model weights (avoid HuggingFace downloads)
      - /mnt/nas/models:/models
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - FISH_SPEECH_MODEL_PATH=/models/fish-speech/s2-pro
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command: >
      celery -A app.core.celery worker
      --loglevel=info -Q tts.fish-speech
      --pool=threads --concurrency=1
      --hostname fish-worker@%h -E

  worker-qwen3:
    image: open_speakers-worker-qwen3:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.worker-qwen3
    volumes:
      - ./backend:/app
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
      # NAS models — local model weights (avoid HuggingFace downloads)
      - /mnt/nas/models:/models
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - AUDIO_OUTPUT_DIR=/app/audio_output
    command: >
      celery -A app.core.celery worker
      --loglevel=info -Q tts.qwen3
      --pool=threads --concurrency=1
      --hostname qwen3-worker@%h -E

  frontend:
    image: open_speakers-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
