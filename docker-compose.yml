# OpenSpeakers Base Configuration
# This file contains common configuration for all environments
#
# Usage:
#   Development/GPU:  docker compose up -d
#     (COMPOSE_FILE in .env auto-loads override + gpu overlays)
#   Offline:  docker compose -f docker-compose.yml -f docker-compose.offline.yml -f docker-compose.gpu.yml up -d

services:
  postgres:
    container_name: open_speakers-postgres
    image: postgres:17.5-alpine
    restart: always
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-openspeakers}
      - POSTGRES_USER=${POSTGRES_USER:-openspeakers}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openspeakers}
    security_opt:
      - no-new-privileges:true
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openspeakers}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: open_speakers-redis
    image: redis:8.2.2-alpine3.22
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: open_speakers-backend
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: open_speakers-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # concurrency=1: only ONE generation at a time to prevent GPU memory contention
    # max-tasks-per-child=1000: keep worker alive across many requests
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts
      --pool=threads
      --concurrency=1
      --max-tasks-per-child=1000
      --hostname tts-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./model_cache}/torch:/home/appuser/.cache/torch
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - HF_HOME=/home/appuser/.cache/huggingface
      - HOME=/home/appuser
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d tts-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-kokoro:
    container_name: open_speakers-worker-kokoro
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Dedicated Kokoro worker — always-on standby model gets its own queue
    # so it is never blocked by longer-running VibeVoice jobs on the main queue.
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.kokoro
      --pool=threads
      --concurrency=1
      --max-tasks-per-child=1000
      --hostname kokoro-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./model_cache}/torch:/home/appuser/.cache/torch
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - HF_HOME=/home/appuser/.cache/huggingface
      - HOME=/home/appuser
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d kokoro-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-fish:
    container_name: open_speakers-worker-fish
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.fish-speech
      --pool=threads
      --concurrency=1
      --hostname fish-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d fish-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-qwen3:
    container_name: open_speakers-worker-qwen3
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.qwen3
      --pool=threads
      --concurrency=1
      --hostname qwen3-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d qwen3-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-f5:
    container_name: open_speakers-worker-f5
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.f5-tts
      --pool=threads
      --concurrency=1
      --hostname f5-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
      - /mnt/nas/models:/models
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d f5-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-orpheus:
    container_name: open_speakers-worker-orpheus
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    shm_size: '2gb'
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.orpheus
      --pool=threads
      --concurrency=1
      --hostname orpheus-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
      - /mnt/nas/models:/models
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d orpheus-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-dia:
    container_name: open_speakers-worker-dia
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.dia
      --pool=threads
      --concurrency=1
      --hostname dia-worker@%h
      -E
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/root/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
      - /mnt/nas/models:/models
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d dia-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-asr:
    container_name: open_speakers-worker-asr
    restart: unless-stopped
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # CPU-only by default — faster-whisper `base` model in ~80 MB int8 mode.
    # No GPU reservation here; flip via the docker-compose.gpu.yml fragment
    # if you want the model on GPU 0.
    build:
      context: ./backend
      dockerfile: Dockerfile.worker-asr
    image: open_speakers-worker-asr:latest
    command: >
      celery -A app.core.celery worker
      --loglevel=info
      -Q tts.asr
      --pool=threads
      --concurrency=1
      --max-tasks-per-child=1000
      --hostname asr-worker@%h
      -E
    volumes:
      - ./backend:/app
      - ./configs:/app/configs:ro
      - ${MODEL_CACHE_DIR:-./model_cache}/huggingface:/home/appuser/.cache/huggingface
      - ${AUDIO_OUTPUT_DIR:-./audio_output}:/app/audio_output
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - HF_HOME=/home/appuser/.cache/huggingface
      - HOME=/home/appuser
      - PYTHONPATH=/app
      # Whisper defaults — override in .env to switch to GPU mode.
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d asr-worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: open_speakers-frontend
    restart: always
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    driver: bridge
